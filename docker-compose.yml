services:
  kotaemon:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${KH_TARGET_IMAGE:-lite} # full | graphrag-light | ollama-docs | ollama | paddle
      args:
        KH_APP_EXTRAS: ${KH_APP_EXTRAS:-runtime-lite}
        KH_APP_PROFILE: ${KH_APP_PROFILE:-lite}
    # To use a prebuilt image instead of building locally, comment out `build`
    # above and uncomment the line below:
    # image: ghcr.io/cinnamon/kotaemon:main-lite
    image: kotaemon:local
    container_name: kotaemon
    ports:
      - "7860:7860"
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      KH_APP_PROFILE: ${KH_APP_PROFILE:-lite}
      KH_ENABLE_FEATURES: ${KH_ENABLE_FEATURES:-reader-docling}
      KH_DISABLE_FEATURES: ${KH_DISABLE_FEATURES:-}
    env_file:
      - path: .env # config seed on first run; create from .env.example
        required: false
    volumes:
      - ./ktem_app_data:/app/ktem_app_data
    restart: unless-stopped
