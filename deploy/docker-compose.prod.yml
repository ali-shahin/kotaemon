# Production stack for the Hetzner VPS demo deployment.
# Pulls the prebuilt lite image from ghcr (built by .github/workflows/deploy-demo.yaml)
# and fronts it with Caddy for automatic TLS. See deploy/README.md for setup.
#
# Run from the repo root on the VPS:
#   docker compose -f deploy/docker-compose.prod.yml pull
#   docker compose -f deploy/docker-compose.prod.yml up -d
services:
  kotaemon:
    image: ${KOTAEMON_IMAGE:-ghcr.io/ali-shahin/kotaemon:demo-lite}
    container_name: kotaemon
    # No host port published: only Caddy (same network) reaches it.
    expose:
      - "7860"
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      KH_APP_PROFILE: ${KH_APP_PROFILE:-lite}
      KH_ENABLE_FEATURES: ${KH_ENABLE_FEATURES:-}
      KH_DISABLE_FEATURES: ${KH_DISABLE_FEATURES:-}
    env_file:
      # Secrets + KH_DOMAIN live here, on the VPS only (git-ignored).
      - path: ../.env
        required: false
    volumes:
      - ../ktem_app_data:/app/ktem_app_data
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    depends_on:
      - kotaemon
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Consumed by ./Caddyfile; set in ../.env (e.g. KH_DOMAIN=demo.example.com).
      KH_DOMAIN: ${KH_DOMAIN:?set KH_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
